<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feed — Demo</title>
    <link rel="stylesheet" href="/src/style.css" />
    <style>
      /* The dominant production-SPA layout: shell locked to the viewport,
         content scrolling inside a nested container. `fullPage` sees only
         the shell unless the capturer understands inner scroll. */
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      .app {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        flex: none;
        padding: 12px 16px;
        background: #1a1d21;
        color: #fff;
      }
      main.feed {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }
      .row {
        height: 40px;
        border-bottom: 1px solid #e2e5e9;
        background: #fff;
        padding: 8px;
      }
      .end-sentinel {
        height: 40px;
        background: #2244aa;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar">Activity</div>
      <main class="feed" data-testid="feed">
        <div id="rows"></div>
        <div class="end-sentinel" data-testid="feed-end"></div>
      </main>
    </div>
    <script type="module">
      const rows = document.getElementById('rows');
      for (let i = 1; i <= 60; i++) {
        const d = document.createElement('div');
        d.className = 'row';
        d.textContent = 'event ' + i;
        rows.appendChild(d);
      }
    </script>
  </body>
</html>
