<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tall — Demo</title>
    <link rel="stylesheet" href="/src/style.css" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      .app {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      main.long {
        flex: 1;
        overflow-y: auto;
      }
      .block {
        height: 15000px;
        background: linear-gradient(#fff, #ccd);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <main class="long" data-testid="long">
        <div class="block"></div>
      </main>
    </div>
  </body>
</html>
